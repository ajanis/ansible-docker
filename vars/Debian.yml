---
docker_dependency_pkgs:
  - gcc
  - python{{ ansible_facts['python']['version']['major'] }}-dev
  - python{{ ansible_facts['python']['version']['major'] }}-pip
  - python{{ ansible_facts['python']['version']['major'] }}-docker
  - python{{ ansible_facts['python']['version']['major'] }}-dockerpycreds
  - python{{ ansible_facts['python']['version']['major'] }}-dockerpty
  - python{{ ansible_facts['python']['version']['major'] }}-debian
  - build-essential
  - libffi-dev

docker_io_pkgs:
  - docker.io
  - containerd
  - docker-compose-v2
  - docker-buildx

docker_ce_pkgs:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
  - python{{ ansible_facts['python']['version']['major'] }}-requests
  - python{{ ansible_facts['python']['version']['major'] }}-docker

docker_nvidia_driver_dependencies:
  - gcc
  - binutils
  - make
  - linux-source
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg-agent
  - software-properties-common
  - jq

docker_nvidia_driver_packages:
  - nvidia-headless-550
  - libnvidia-encode-550
  - libnvidia-decode-550
  - libnvidia-compute-550
  - nvidia-utils-550
  - nvidia-kernel-common-550
  - nvidia-kernel-source-550

docker_nvidia_cuda_packages:
  - cudnn9-cuda-12

docker_nvidia_docker_packages:
  - libnvidia-container-tools
  - libnvidia-container1
  - nvidia-container-toolkit
  - nvidia-docker2
  - nvidia-container-runtime

docker_py3_pkgs:
  - docker
  - docker-compose
docker_repo_url: https://download.docker.com/linux
